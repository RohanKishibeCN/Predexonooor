mode: dry_run

account_id: ""

poll_interval_seconds: 20
max_markets_scan: 30

venues:
  enabled:
    - polymarket
    - limitless
  prefer_order:
    - polymarket
    - limitless
    - predict
    - opinion

liquidity:
  max_spread: 0.02
  min_top_depth_usd: 20

risk:
  starting_capital_usd: 100
  max_per_trade_usd: 5
  max_exposure_per_market_usd: 10
  max_total_exposure_usd: 30
  max_open_positions: 3
  daily_max_loss_usd: 3
  max_drawdown_usd: 8

execution:
  entry:
    take_profit_pct: 0.01
    stop_loss_pct: 0.015
    max_hold_minutes: 60
  slippage_guard_pct: 0.008
